{% extends "base.html" %}
{% block title %}TRON行为分析{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto pb-16">
    <!-- Tool header -->
    <div class="card p-6 mb-6">
        <p class="terminal-header mb-2">tron_behavior_analyzer.sh</p>
        <p class="text-gray-400">分析地址行为模式：首次资金来源、交易模式、地址关系、活动时间线</p>
    </div>

    <!-- Input section -->
    <div class="card p-6 mb-6">
        <h2 class="text-lg font-bold mb-4" style="color: var(--accent-green);">>> 输入TRON地址</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1" style="color: var(--text-muted);">TRON钱包地址</label>
                <input type="text" id="address-input" class="w-full"
                       placeholder="例如：TUtPdo7L45ey2KrpibdNcjNL3ujqXo1NNw">
            </div>
            <div class="flex space-x-4">
                <button onclick="loadSample()" class="btn-secondary">
                    加载样本
                </button>
                <button onclick="analyzeBehavior()" class="btn-primary">
                    开始分析
                </button>
            </div>
        </div>
    </div>

    <!-- Loading indicator -->
    <div id="loading" class="hidden card p-6 mb-6">
        <div class="flex items-center justify-center">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2" style="border-color: var(--accent-green);"></div>
            <span class="ml-3 text-gray-400">正在分析地址行为...</span>
        </div>
    </div>

    <!-- Error display -->
    <div id="error-display" class="hidden alert-red rounded-lg p-4 mb-6">
        <p id="error-message" style="color: var(--alert-red);"></p>
    </div>

    <!-- Results section -->
    <div id="results" class="hidden">
        <!-- Card 1: First Funding Source -->
        <div id="funding-source-card" class="card p-6 mb-6">
            <h2 class="text-lg font-bold mb-4 flex items-center" style="color: var(--accent-green);">
                <span style="color: var(--link-color);">></span> 首次资金来源
            </h2>
            <div id="funding-source-content" class="grid grid-cols-2 gap-4"></div>
        </div>

        <!-- Card 2: Transfer Patterns -->
        <div id="transfer-patterns-card" class="card p-6 mb-6">
            <h2 class="text-lg font-bold mb-4 flex items-center" style="color: var(--accent-green);">
                <span style="color: var(--link-color);">></span> 交易模式
            </h2>
            <div id="transfer-patterns-content" class="grid grid-cols-2 gap-4"></div>
        </div>

        <!-- Card 3: Address Relationships -->
        <div id="relationships-card" class="card p-6 mb-6">
            <h2 class="text-lg font-bold mb-4 flex items-center" style="color: var(--accent-green);">
                <span style="color: var(--link-color);">></span> 地址关系
            </h2>
            <div id="relationships-content"></div>
        </div>

        <!-- Card 4: Activity Timeline -->
        <div id="timeline-card" class="card p-6 mb-6">
            <h2 class="text-lg font-bold mb-4 flex items-center" style="color: var(--accent-green);">
                <span style="color: var(--link-color);">></span> 活动时间线
            </h2>
            <div id="timeline-content" class="grid grid-cols-2 gap-4"></div>
        </div>

        <!-- Export buttons -->
        <div class="card p-6 mb-6">
            <h2 class="text-lg font-bold mb-4" style="color: var(--accent-green);">>> 导出结果</h2>
            <div class="flex space-x-4">
                <button onclick="exportJSON()" class="btn-primary">导出JSON</button>
                <button onclick="exportCSV()" class="btn-secondary">导出CSV</button>
                <button onclick="exportPDF()" class="btn-secondary">导出PDF</button>
            </div>
        </div>
    </div>
</div>

<script>
const CACHE_KEY = 'cit_tron_behavior_result';
let analysisResult = null;

function loadSample() {
    fetch('/tron/api/sample')
        .then(response => response.json())
        .then(data => {
            document.getElementById('address-input').value = data.address;
        })
        .catch(error => {
            alert('加载样本失败: ' + error.message);
        });
}

function analyzeBehavior() {
    const address = document.getElementById('address-input').value.trim();

    if (!address) {
        alert('请输入TRON地址');
        return;
    }

    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('error-display').classList.add('hidden');
    document.getElementById('results').classList.add('hidden');

    fetch('/tron/api/behavior', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ address: address })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('loading').classList.add('hidden');

        if (data.success) {
            analysisResult = data;
            // Save to sessionStorage for persistence
            sessionStorage.setItem(CACHE_KEY, JSON.stringify(data));
            sessionStorage.setItem(CACHE_KEY + '_address', address);
            displayResults(data);
        } else {
            showError(data.error || '分析失败');
        }
    })
    .catch(error => {
        document.getElementById('loading').classList.add('hidden');
        showError('请求失败: ' + error.message);
    });
}

function showError(message) {
    document.getElementById('error-message').textContent = message;
    document.getElementById('error-display').classList.remove('hidden');
}

function displayResults(data) {
    document.getElementById('results').classList.remove('hidden');
    displayFundingSource(data.behaviors.funding_source);
    displayTransferPatterns(data.behaviors.transfer_patterns);
    displayRelationships(data.behaviors.relationships);
    displayTimeline(data.behaviors.timeline);
}

function displayFundingSource(funding) {
    const container = document.getElementById('funding-source-content');

    if (funding.status) {
        container.innerHTML = `<div class="col-span-2 card-inner p-4 rounded text-center"><p style="color: var(--text-muted);">${funding.status}</p></div>`;
        return;
    }

    container.innerHTML = `
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">资助地址</span>
            <p class="font-bold text-white text-sm">${funding.funder_address}</p>
        </div>
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">首次转入时间</span>
            <p class="font-bold text-white">${funding.first_transfer_time_str}</p>
        </div>
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">首次转入金额</span>
            <p class="font-bold text-white">${funding.first_amount} USDT</p>
        </div>
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">资助方交易数</span>
            <p class="font-bold text-white">${funding.funder_tx_count}</p>
        </div>
    `;
}

function displayTransferPatterns(patterns) {
    const container = document.getElementById('transfer-patterns-content');

    if (patterns.status) {
        container.innerHTML = `<div class="col-span-2 card-inner p-4 rounded text-center"><p style="color: var(--text-muted);">${patterns.status}</p></div>`;
        return;
    }

    const ratioColor = patterns.in_out_ratio === '无穷大' ? 'var(--alert-red)' :
                       patterns.in_out_ratio_raw > 5 ? 'var(--alert-green)' :
                       patterns.in_out_ratio_raw < 0.5 ? 'var(--alert-red)' : 'var(--text-light)';

    container.innerHTML = `
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">转入总额</span>
            <p class="font-bold" style="color: var(--alert-green);">${patterns.total_in} USDT</p>
        </div>
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">转出总额</span>
            <p class="font-bold" style="color: var(--alert-red);">${patterns.total_out} USDT</p>
        </div>
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">入出比例</span>
            <p class="font-bold" style="color: ${ratioColor};">${patterns.in_out_ratio}</p>
        </div>
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">平均转账间隔</span>
            <p class="font-bold text-white">${patterns.avg_transfer_interval_hours} 小时</p>
        </div>
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">转入次数</span>
            <p class="font-bold text-white">${patterns.transfer_count_in}</p>
        </div>
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">转出次数</span>
            <p class="font-bold text-white">${patterns.transfer_count_out}</p>
        </div>
    `;
}

function displayRelationships(relationships) {
    const container = document.getElementById('relationships-content');

    if (relationships.status) {
        container.innerHTML = `<div class="card-inner p-4 rounded text-center"><p style="color: var(--text-muted);">${relationships.status}</p></div>`;
        return;
    }

    let html = `
        <div class="mb-4 card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">互动地址数</span>
            <p class="font-bold text-white">${relationships.unique_addresses_interacted}</p>
        </div>
        <h3 class="text-sm font-medium mb-2" style="color: var(--text-muted);">频繁交易对象（Top 5）</h3>
        <div class="space-y-2">
    `;

    for (const cp of relationships.top_counterparties) {
        html += `
            <div class="card-inner p-3 rounded">
                <div class="flex justify-between items-center">
                    <span class="text-sm font-medium text-white address-full" style="letter-spacing: 0.08em; overflow-x: auto; max-width: 70%;">${cp.address}</span>
                    <span class="text-xs" style="color: var(--text-light);">${cp.interaction_count}次互动</span>
                </div>
                <div class="mt-1 text-xs" style="color: var(--text-light);">
                    总额: ${cp.total_amount} USDT (入: ${cp.total_in}, 出: ${cp.total_out})
                </div>
            </div>
        `;
    }

    html += '</div>';
    container.innerHTML = html;
}

function displayTimeline(timeline) {
    const container = document.getElementById('timeline-content');

    if (timeline.status) {
        container.innerHTML = `<div class="col-span-2 card-inner p-4 rounded text-center"><p style="color: var(--text-muted);">${timeline.status}</p></div>`;
        return;
    }

    container.innerHTML = `
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">首次活动</span>
            <p class="font-bold text-white">${timeline.first_activity_str}</p>
        </div>
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">最后活动</span>
            <p class="font-bold text-white">${timeline.last_activity_str}</p>
        </div>
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">活跃天数</span>
            <p class="font-bold text-white">${timeline.active_days} 天</p>
        </div>
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">总交易数</span>
            <p class="font-bold text-white">${timeline.total_transfers}</p>
        </div>
        <div class="col-span-2 card-inner p-3 rounded" style="border: 1px dashed var(--alert-yellow);">
            <span class="text-sm" style="color: var(--text-muted);">高峰活动期</span>
            <p class="font-bold" style="color: var(--alert-yellow);">${timeline.peak_activity_period.period_str} (${timeline.peak_activity_period.count}笔交易)</p>
        </div>
    `;
}

function exportJSON() {
    if (!analysisResult) { alert('请先进行地址分析'); return; }
    fetch('/tron/api/export/behavior/json', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ result: analysisResult })
    })
    .then(response => {
        const disposition = response.headers.get('Content-Disposition');
        const filename = disposition ? disposition.split('filename=')[1].replace(/"/g, '') : 'behavior_analysis.json';
        return response.blob().then(blob => ({ blob, filename }));
    })
    .then(({ blob, filename }) => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        window.URL.revokeObjectURL(url);
    })
    .catch(error => alert('导出失败: ' + error.message));
}

function exportCSV() {
    if (!analysisResult) { alert('请先进行地址分析'); return; }
    fetch('/tron/api/export/behavior/csv', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ result: analysisResult })
    })
    .then(response => {
        const disposition = response.headers.get('Content-Disposition');
        const filename = disposition ? disposition.split('filename=')[1].replace(/"/g, '') : 'behavior_analysis.csv';
        return response.blob().then(blob => ({ blob, filename }));
    })
    .then(({ blob, filename }) => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        window.URL.revokeObjectURL(url);
    })
    .catch(error => alert('导出失败: ' + error.message));
}

function exportPDF() {
    if (!analysisResult) { alert('请先进行地址分析'); return; }
    fetch('/docs/api/export/pdf', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ result: analysisResult, tool_type: 'tron_behavior' })
    })
    .then(response => {
        const filename = response.headers.get('Content-Disposition').split('filename=')[1].replace(/"/g, '');
        return response.blob().then(blob => ({ blob, filename }));
    })
    .then(({ blob, filename }) => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        window.URL.revokeObjectURL(url);
    })
    .catch(error => alert('PDF导出失败: ' + error.message));
}

// Restore cached results on page load
window.onload = function() {
    const cachedAddress = sessionStorage.getItem(CACHE_KEY + '_address');
    const cachedResult = sessionStorage.getItem(CACHE_KEY);

    if (cachedAddress) {
        document.getElementById('address-input').value = cachedAddress;
    }

    if (cachedResult) {
        try {
            analysisResult = JSON.parse(cachedResult);
            displayResults(analysisResult);
        } catch (e) {
            console.error('Failed to restore cached result:', e);
        }
    }
};
</script>
{% endblock %}
