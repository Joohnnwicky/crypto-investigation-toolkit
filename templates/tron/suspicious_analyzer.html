{% extends "base.html" %}
{% block title %}TRON可疑特征分析{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto pb-16">
    <!-- Tool header -->
    <div class="card p-6 mb-6">
        <p class="terminal-header mb-2">tron_suspicious_analyzer.sh</p>
        <p class="text-gray-400">识别诈骗/洗钱等可疑行为特征，生成风险评分报告</p>
    </div>

    <!-- Input section -->
    <div class="card p-6 mb-6">
        <h2 class="text-lg font-bold mb-4" style="color: var(--accent-green);">>> 输入TRON地址</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1" style="color: var(--text-muted);">TRON钱包地址</label>
                <input type="text" id="address-input" class="w-full"
                       placeholder="例如：TUtPdo7L45ey2KrpibdNcjNL3ujqXo1NNw">
            </div>
            <div class="flex space-x-4">
                <button onclick="loadSample()" class="btn-secondary">
                    加载样本
                </button>
                <button onclick="analyzeAddress()" class="btn-primary">
                    开始分析
                </button>
            </div>
        </div>
    </div>

    <!-- Loading indicator -->
    <div id="loading" class="hidden card p-6 mb-6">
        <div class="flex items-center justify-center">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2" style="border-color: var(--accent-green);"></div>
            <span class="ml-3 text-gray-400">正在分析地址...</span>
        </div>
    </div>

    <!-- Error display -->
    <div id="error-display" class="hidden alert-red rounded-lg p-4 mb-6">
        <p id="error-message" style="color: var(--alert-red);"></p>
    </div>

    <!-- Results section -->
    <div id="results" class="hidden">
        <!-- Basic info -->
        <div class="card p-6 mb-6">
            <h2 class="text-lg font-bold mb-4" style="color: var(--accent-green);">>> 基本信息</h2>
            <div id="basic-info" class="grid grid-cols-2 gap-4"></div>
        </div>

        <!-- Score display -->
        <div id="score-display" class="card p-6 mb-6">
            <h2 class="text-lg font-bold mb-4" style="color: var(--accent-green);">>> 风险评分</h2>
            <div class="flex items-center justify-center">
                <div id="score-circle" class="w-32 h-32 rounded-full flex items-center justify-center text-3xl font-bold"></div>
                <div id="score-label" class="ml-4 text-xl font-medium"></div>
            </div>
        </div>

        <!-- Red alerts -->
        <div id="red-alerts" class="hidden alert-red rounded-lg p-6 mb-6">
            <h2 class="text-lg font-bold mb-4" style="color: var(--alert-red);">红色警报（高度可疑）</h2>
            <div id="red-list" class="space-y-4"></div>
        </div>

        <!-- Yellow alerts -->
        <div id="yellow-alerts" class="hidden alert-yellow rounded-lg p-6 mb-6">
            <h2 class="text-lg font-bold mb-4" style="color: var(--alert-yellow);">黄色预警（需要关注）</h2>
            <div id="yellow-list" class="space-y-4"></div>
        </div>

        <!-- Green alerts -->
        <div id="green-alerts" class="hidden alert-green rounded-lg p-6 mb-6">
            <h2 class="text-lg font-bold mb-4" style="color: var(--alert-green);">正常范围</h2>
            <div id="green-list" class="space-y-4"></div>
        </div>

        <!-- Export buttons -->
        <div class="card p-6 mb-6">
            <h2 class="text-lg font-bold mb-4" style="color: var(--accent-green);">>> 导出结果</h2>
            <div class="flex space-x-4">
                <button onclick="exportJSON()" class="btn-primary">
                    导出JSON
                </button>
                <button onclick="exportCSV()" class="btn-secondary">
                    导出CSV
                </button>
                <button onclick="exportPDF()" class="btn-secondary">
                    导出PDF
                </button>
            </div>
        </div>
    </div>
</div>

<script>
const CACHE_KEY = 'cit_tron_suspicious_result';
let analysisResult = null;

function loadSample() {
    fetch('/tron/api/sample')
        .then(response => response.json())
        .then(data => {
            document.getElementById('address-input').value = data.address;
        })
        .catch(error => {
            alert('加载样本失败: ' + error.message);
        });
}

function analyzeAddress() {
    const address = document.getElementById('address-input').value.trim();

    if (!address) {
        alert('请输入TRON地址');
        return;
    }

    // Show loading
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('error-display').classList.add('hidden');
    document.getElementById('results').classList.add('hidden');

    fetch('/tron/api/analyze', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ address: address })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('loading').classList.add('hidden');

        if (data.success) {
            analysisResult = data;
            // Save to sessionStorage for persistence
            sessionStorage.setItem(CACHE_KEY, JSON.stringify(data));
            sessionStorage.setItem(CACHE_KEY + '_address', address);
            displayResults(data);
        } else {
            showError(data.error || '分析失败');
        }
    })
    .catch(error => {
        document.getElementById('loading').classList.add('hidden');
        showError('请求失败: ' + error.message);
    });
}

function showError(message) {
    document.getElementById('error-message').textContent = message;
    document.getElementById('error-display').classList.remove('hidden');
}

function displayResults(data) {
    document.getElementById('results').classList.remove('hidden');

    // Display basic info
    const basicInfo = document.getElementById('basic-info');
    basicInfo.innerHTML = `
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">TRX余额</span>
            <p class="font-bold text-white">${data.basic_info.balance.toFixed(6)} TRX</p>
        </div>
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">USDT余额</span>
            <p class="font-bold text-white">${data.basic_info.usdt_balance.toFixed(2)} USDT</p>
        </div>
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">总交易数</span>
            <p class="font-bold text-white">${data.basic_info.total_transaction_count}</p>
        </div>
        <div class="card-inner p-3 rounded">
            <span class="text-sm" style="color: var(--text-muted);">分析地址</span>
            <p class="font-bold text-white text-sm">${data.address}</p>
        </div>
    `;

    // Display score
    const score = data.alerts.score;
    const scoreCircle = document.getElementById('score-circle');
    const scoreLabel = document.getElementById('score-label');

    scoreCircle.textContent = score;

    if (score >= 70) {
        scoreCircle.style.background = 'var(--alert-red)';
        scoreCircle.style.color = '#1A1A1A';
        scoreLabel.textContent = '高风险';
        scoreLabel.style.color = 'var(--alert-red)';
    } else if (score >= 40) {
        scoreCircle.style.background = 'var(--alert-yellow)';
        scoreCircle.style.color = '#1A1A1A';
        scoreLabel.textContent = '中等风险';
        scoreLabel.style.color = 'var(--alert-yellow)';
    } else {
        scoreCircle.style.background = 'var(--alert-green)';
        scoreCircle.style.color = '#1A1A1A';
        scoreLabel.textContent = '低风险';
        scoreLabel.style.color = 'var(--alert-green)';
    }

    // Display alerts
    displayAlerts('red', data.alerts.red || []);
    displayAlerts('yellow', data.alerts.yellow || []);
    displayAlerts('green', data.alerts.green || []);
}

function displayAlerts(type, alerts) {
    const container = document.getElementById(`${type}-alerts`);
    const list = document.getElementById(`${type}-list`);

    if (alerts.length === 0) {
        container.classList.add('hidden');
        return;
    }

    container.classList.remove('hidden');
    list.innerHTML = alerts.map(alert => `
        <div class="card-inner rounded p-4">
            <p class="font-bold text-white">${alert.feature}</p>
            <p class="text-sm text-gray-400 mt-1"><strong>详情:</strong> ${alert.detail}</p>
            <p class="text-sm" style="color: var(--text-muted);">意义: ${alert.meaning}</p>
        </div>
    `).join('');
}

function exportJSON() {
    if (!analysisResult) {
        alert('请先进行地址分析');
        return;
    }

    fetch('/tron/api/export/json', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ result: analysisResult })
    })
    .then(response => {
        const filename = response.headers.get('Content-Disposition').split('filename=')[1].replace(/"/g, '');
        return response.blob().then(blob => ({ blob, filename }));
    })
    .then(({ blob, filename }) => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        window.URL.revokeObjectURL(url);
    })
    .catch(error => {
        alert('导出失败: ' + error.message);
    });
}

function exportCSV() {
    if (!analysisResult) {
        alert('请先进行地址分析');
        return;
    }

    fetch('/tron/api/export/csv', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ result: analysisResult })
    })
    .then(response => {
        const filename = response.headers.get('Content-Disposition').split('filename=')[1].replace(/"/g, '');
        return response.blob().then(blob => ({ blob, filename }));
    })
    .then(({ blob, filename }) => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        window.URL.revokeObjectURL(url);
    })
    .catch(error => {
        alert('导出失败: ' + error.message);
    });
}

function exportPDF() {
    if (!analysisResult) {
        alert('请先进行地址分析');
        return;
    }

    fetch('/docs/api/export/pdf', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ result: analysisResult, tool_type: 'tron_suspicious' })
    })
    .then(response => {
        const filename = response.headers.get('Content-Disposition').split('filename=')[1].replace(/"/g, '');
        return response.blob().then(blob => ({ blob, filename }));
    })
    .then(({ blob, filename }) => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        window.URL.revokeObjectURL(url);
    })
    .catch(error => {
        alert('PDF导出失败: ' + error.message);
    });
}

// Restore cached results on page load
window.onload = function() {
    const cachedAddress = sessionStorage.getItem(CACHE_KEY + '_address');
    const cachedResult = sessionStorage.getItem(CACHE_KEY);

    if (cachedAddress) {
        document.getElementById('address-input').value = cachedAddress;
    }

    if (cachedResult) {
        try {
            analysisResult = JSON.parse(cachedResult);
            displayResults(analysisResult);
        } catch (e) {
            console.error('Failed to restore cached result:', e);
        }
    }
};
</script>
{% endblock %}
